<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Smart Touch</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .thank-box {
      width: 100%;
      max-width: 650px;
      background: #ffffff;
      padding: 42px 32px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .thank-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(15, 118, 110, 0.12);
      color: #0f766e;
      font-size: 34px;
    }

    h1 {
      color: #0f172a;
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 14px;
    }

    p {
      color: #64748b;
      line-height: 1.9;
      margin-bottom: 24px;
      font-size: 1.05rem;
    }

    .btn-back {
      display: inline-block;
      text-decoration: none;
      background: #0f766e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
    }

    .btn-back:hover {
      background: #0b5f59;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="thank-box">
    <div class="thank-icon">✓</div>
    <h1>Thank you!</h1>
    <p>Your request has been sent successfully. Our team will contact you soon.</p>
    <a href="index.html" class="btn-back">Back to Home</a>
  </div>
</body>
</html>
